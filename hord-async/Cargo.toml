[package]
name = "hord-async"
description = "Async (tokio) AsyncRead/AsyncWrite wrapper over a HORD stream"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# `listener` (default) gates the server-side `HordListener` thread-per-core
# topology and the deps it alone needs: `log` plus tokio's `sync` (watch/mpsc)
# and `macros` (`select!`). An embedder that brings its own accept loop and wants
# only the `AsyncRead`/`AsyncWrite` adapter sets `default-features = false` to drop
# all three â€” the adapter core (lib.rs) uses none of them.
[features]
default = ["listener"]
listener = ["dep:log", "tokio/sync", "tokio/macros"]

# This is the one crate in the workspace that takes third-party dependencies:
# the async milestone targets tokio + hyper, and isolating them here keeps
# hord-core and hord-stream dependency-free (and buildable on an air-gapped RDMA
# host with only a C compiler and rdma-core).
[dependencies]
hord-stream = { path = "../hord-stream" }
# The zero-copy header codec + write policy (RdmaWriteReq / RdmaWriteStatus /
# RdmaWriteAction / SourcePool): `SharedAsyncStream::serve_rdma_write{,_pooled}`
# run the Â§7.3/Â§7.7 policy and drive the async one-sided write through it, so they
# are the async counterpart of `hord_zerocopy::serve_rdma_write*`. The `rdma`
# feature is on because we use that orchestration (SourcePool etc.), not just the
# codec â€” but it pulls in nothing beyond hord-stream, which hord-async already
# links, so hord-async stays RDMA-only by construction (no new external linkage)
# and there is no dependency cycle (hord-zerocopy does not depend on hord-async).
hord-zerocopy = { path = "../hord-zerocopy", features = ["rdma"] }
# "rt": `spawn_local`/`spawn_blocking`/`LocalSet` + the current-thread runtimes
#   the multi-waiter split (`AsyncHordStream::into_split`) and `HordListener`'s
#   thread-per-core workers run on.
# "sync"/"macros" are pulled in only by the `listener` feature (see above):
#   "sync" = `watch` (graceful-shutdown signal) + `mpsc` (acceptor â†’ worker
#   handoff); "macros" = `tokio::select!` in the accept loop. The adapter core
#   needs neither, so they are not in this base set.
tokio = { version = "1", features = ["net", "io-util", "time", "rt"] }
# Lightweight logging facade for the server loop (handshake/accept/drain
# diagnostics). Near-zero cost with no logger installed; integrates with the
# host's `log` setup (e.g. Carapace) when there is one. Only the `listener`
# feature uses it, so it is optional and pulled in via `dep:log`.
log = { version = "0.4", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["net", "io-util", "time", "rt", "macros", "sync"] }
# Test-only: per-thread CPU accounting (CLOCK_THREAD_CPUTIME_ID) for the #15
# busy-poll-vs-park measurement in tests/idle_cpu.rs.
libc = "0.2"
